version: '3.8'

services:
  # Backend Microservice
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - STELLAR_NETWORK=TESTNET
      - STELLAR_HORIZON_URL=https://horizon-testnet.stellar.org
      - BACKEND_PORT=3001
      - FRONTEND_URL=http://localhost:3000
      - REDIS_URL=redis://redis:6379
      - MONGODB_URL=mongodb://mongo:27017/stellar-did
    depends_on:
      - redis
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - stellar-did-network
    restart: unless-stopped

  # Frontend React Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:3001/api/v1
      - REACT_APP_STELLAR_NETWORK=TESTNET
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - stellar-did-network
    restart: unless-stopped

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - stellar-did-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # MongoDB for data persistence
  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=stellar-did
    volumes:
      - mongo_data:/data/db
      - ./backend/scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - stellar-did-network
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - stellar-did-network
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
  mongo_data:
    driver: local

networks:
  stellar-did-network:
    driver: bridge
